name: Release on Main Push

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  build_exe:
    name: Build Windows executable
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if (Test-Path requirements-dev.txt) {
            pip install -r requirements-dev.txt
          } else {
            pip install pyinstaller
          }

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $line = Get-Content src/__init__.py | Where-Object { $_ -match '^__version__\s*=' } | Select-Object -First 1
          if (-not $line) { throw "Could not find __version__ in src/__init__.py" }
          $version = ($line -split '"')[1]
          if (-not $version) { throw "Version value is empty" }
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=V$version" >> $env:GITHUB_OUTPUT
          Write-Host "Version detected: $version"

      - name: Build escaneo.exe in repository root
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --icon=escaneo.ico --name=escaneo --distpath=. --workpath=build --specpath=. escaneo.py
          if (-not (Test-Path escaneo.exe)) { throw "escaneo.exe was not generated" }

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: escaneo-exe
          path: escaneo.exe
          if-no-files-found: error
          retention-days: 14

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build_exe
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download executable artifact
        uses: actions/download-artifact@v4
        with:
          name: escaneo-exe
          path: .

      - name: Create and push tag (with force update if needed)
        env:
          TAG: ${{ needs.build_exe.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Remove local tag if it exists to ensure cleanness
          git tag -d "${TAG}" 2>/dev/null || true
          
          # Create annotated tag with detailed release notes
          git tag -a "${TAG}" -m "Release ${TAG}
          
  Vulnerability Scanner v${TAG#V}
  - Optimized executable build with improved performance
  - Git LFS configuration for efficient binary handling
  - Supporting semantic versioning
  
  See CHANGELOG.md for detailed changes."
          
          # Push with force to handle cases where tag exists on remote
          git push origin "${TAG}" --force

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build_exe.outputs.tag }}
          name: Release ${{ needs.build_exe.outputs.tag }}
          generate_release_notes: true
          files: |
            escaneo.exe
